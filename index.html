const projectImages = { p1: 'melabelle.png', p2: 'bijoux.png', p3: 'le-r.png' };
let currentModalKey = "";
let currentLang = "ar";
let currentCastingStep = 1;

function changeLanguage(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

  document.querySelectorAll('[data-i18n]').forEach(element => {
    const key = element.getAttribute('data-i18n');
    if (dictionary[lang][key]) {
      element.innerText = dictionary[lang][key];
    }
  });

  const placeholders = dictionary[lang].placeholders;
  for (const id in placeholders) {
    const inputElement = document.getElementById(id);
    if (inputElement) {
      inputElement.setAttribute('placeholder', placeholders[id]);
    }
  }
  
  if(document.getElementById('work-modal').style.display === 'flex' && currentModalKey !== "") {
    document.getElementById('modal-title').innerText = dictionary[lang][currentModalKey + '_title'];
    document.getElementById('modal-desc').innerText = dictionary[lang][currentModalKey + '_desc'];
  }
}

window.addEventListener('load',()=>{
  document.getElementById('loader').style.display='none';
  changeLanguage('ar');
});

function toggleTheme(){
  const body = document.body;
  body.classList.toggle('light-theme');
  
  const themeBtn = document.getElementById('theme-btn');
  if(body.classList.contains('light-theme')) {
    themeBtn.innerText = '🌙';
  } else {
    themeBtn.innerText = '☀️';
  }
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('active');
    }
  });
},{threshold:0.2});

document.querySelectorAll('.fade-up').forEach(el=>{
  observer.observe(el);
});

function filterPortfolio(category){
  document.querySelectorAll('.portfolio-tab').forEach(btn=>{
    btn.classList.remove('active');
  });

  document.getElementById('tab-' + category).classList.add('active');

  document.querySelectorAll('.portfolio-item').forEach(item=>{
    if(category === 'all'){
      item.style.display = 'block';
      setTimeout(() => { item.style.opacity = '1'; item.style.transform = 'scale(1)'; }, 50);
    }
    else if(item.classList.contains(category)){
      item.style.display = 'block';
      setTimeout(() => { item.style.opacity = '1'; item.style.transform = 'scale(1)'; }, 50);
    }
    else{
      item.style.opacity = '0';
      item.style.transform = 'scale(0.95)';
      setTimeout(() => { item.style.display = 'none'; }, 400);
    }
  });
}

function openWorkModal(projectKey) {
  currentModalKey = projectKey;
  document.getElementById('modal-title').innerText = dictionary[currentLang][projectKey + '_title'];
  document.getElementById('modal-desc').innerText = dictionary[currentLang][projectKey + '_desc'];
  document.getElementById('modal-img').src = projectImages[projectKey];
  document.getElementById('work-modal').style.display = 'flex';
}

function closeWorkModal() {
  document.getElementById('work-modal').style.display = 'none';
  currentModalKey = "";
}

function moveCastingStep(direction) {
  const newStep = currentCastingStep + direction;
  if (newStep >= 1 && newStep <= 4) {
    document.getElementById(`step-${currentCastingStep}`).classList.remove('active');
    document.querySelectorAll('.step-indicator')[currentCastingStep - 1].classList.remove('active');
    
    currentCastingStep = newStep;
    
    document.getElementById(`step-${currentCastingStep}`).classList.add('active');
    document.querySelectorAll('.step-indicator')[currentCastingStep - 1].classList.add('active');
    
    document.getElementById('prev-step-btn').disabled = (currentCastingStep === 1);
    
    const nextBtn = document.getElementById('next-step-btn');
    if (currentCastingStep === 4) {
      nextBtn.style.display = 'none';
    } else {
      nextBtn.style.display = 'block';
    }
  }
}

function openExpandedAd(event) {
  document.getElementById('expanded-ad-modal').style.display = 'flex';
}

function closeExpandedAd() {
  document.getElementById('expanded-ad-modal').style.display = 'none';
}

function closeSidebarAd(event) {
  event.stopPropagation();
  document.getElementById('sidebar-ad').style.display = 'none';
}

function handleAdBtnClick(event) {
  event.stopPropagation();
  window.location.href = '#cv-upload';
}

function redirectToAdAction() {
  closeExpandedAd();
  window.location.href = '#cv-upload';
}

function requestThisService() {
  const projectTitle = document.getElementById('modal-title').innerText;
  closeWorkModal();
  
  const textarea = document.getElementById('project-details');
  if (textarea) {
    if (currentLang === 'ar') {
      textarea.value = `أنا مهتم بالحصول على خدمة مشابهة لمشروع: ${projectTitle}.\nيرجى التواصل معي لمناقشة التفاصيل.`;
    } else if (currentLang === 'fr') {
      textarea.value = `Je souhaite obtenir un service similaire au projet: ${projectTitle}.\nVeuillez me contacter pour en discuter.`;
    } else {
      textarea.value = `I am interested in getting a service similar to the project: ${projectTitle}.\nPlease contact me to discuss the details.`;
    }
  }
  
  window.location.href = '#contact';
}
</script>
