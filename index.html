<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN STAR MANAGEMENT</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #ECC880 0%, #C3964D 50%, #9B722B 100%);
            --gold-text: #C3964D;
            --gold-light: #ECC880;
            --pure-black: #000000;
            --bg-dark: #070707;
            --card-bg: rgba(15, 15, 15, 0.6);
            --border-gold: rgba(195, 150, 77, 0.2);
            --text-gray: #A0A0A0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--pure-black);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* شريط التنقل العلوي الفخم */
        header {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(195, 150, 77, 0.1);
            padding: 20px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .mini-logo {
            height: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-logo .crown-icon {
            color: var(--gold-text);
            font-size: 24px;
        }

        .mini-logo-text {
            display: flex;
            flex-direction: column;
        }

        .mini-logo-text .main-title {
            font-size: 14px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .mini-logo-text .sub-title {
            font-size: 8px;
            color: var(--gold-text);
            letter-spacing: 0.2px;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a.active, nav a:hover {
            color: var(--gold-light);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .social-icons {
            display: flex;
            gap: 15px;
            color: #ffffff;
            font-size: 14px;
        }

        .btn-connect {
            border: 1px solid var(--gold-text);
            color: #ffffff;
            padding: 8px 22px;
            border-radius: 2px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            background: transparent;
            transition: all 0.3s;
        }

        .btn-connect:hover {
            background: var(--gold-gradient);
            color: var(--pure-black);
            box-shadow: 0 0 15px rgba(195, 150, 77, 0.4);
        }

        /* واجهة البطل السينمائية */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px 40px 20px;
            background: radial-gradient(circle at 80% 20%, rgba(45, 38, 25, 0.4) 0%, rgba(0,0,0,0) 50%),
                        radial-gradient(circle at 20% 80%, rgba(30, 26, 18, 0.3) 0%, rgba(0,0,0,0) 50%),
                        var(--pure-black);
            position: relative;
        }

        .main-brand {
            margin-bottom: 20px;
        }

        .big-crown {
            font-size: 70px;
            color: var(--gold-text);
            line-height: 1;
            margin-bottom: -10px;
            text-shadow: 0 0 20px rgba(195, 150, 77, 0.2);
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 3px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .hero .subtitle-management {
            font-size: 18px;
            font-weight: 400;
            color: #ffffff;
            letter-spacing: 6px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .hero h2 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .hero p.tagline {
            font-size: 15px;
            color: var(--gold-text);
            margin-bottom: 35px;
            position: relative;
            display: inline-block;
        }

        .hero p.tagline::before, .hero p.tagline::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40px;
            height: 1px;
            background: var(--border-gold);
        }
        .hero p.tagline::before { right: -50px; }
        .hero p.tagline::after { left: -50px; }

        .btn-discover {
            border: 1px solid var(--gold-text);
            color: #ffffff;
            padding: 12px 35px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
        }

        .btn-discover:hover {
            background: rgba(195, 150, 77, 0.1);
            color: var(--gold-light);
        }

        .arrow-down {
            margin-top: 50px;
            color: var(--gold-text);
            font-size: 20px;
            animation: bounce 2s infinite;
        }

        /* قسم خدماتنا */
        .services-section {
            padding: 80px 6%;
            background-color: var(--bg-dark);
        }

        .section-label {
            text-align: center;
            font-size: 11px;
            color: var(--text-gray);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .section-title {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: var(--gold-text);
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 100px;
            height: 1px;
            background: var(--gold-gradient);
            margin: 10px auto 0 auto;
        }

        .services-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .service-card {
            background: var(--card-bg);
            border: 1px solid var(--border-gold);
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .service-card:hover {
            background: rgba(195, 150, 77, 0.05);
            border-color: var(--gold-light);
            transform: translateY(-5px);
        }

        .service-icon {
            font-size: 36px;
            color: var(--gold-text);
            margin-bottom: 20px;
        }

        .service-card h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold-text);
            margin-bottom: 12px;
        }

        .service-card p {
            font-size: 12px;
            color: var(--text-gray);
            line-height: 1.8;
        }

        /* قسم أعمالنا */
        .portfolio-section {
            padding: 80px 6%;
            background-color: var(--pure-black);
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .tab {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 6px 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active, .tab:hover {
            border-color: var(--gold-text);
            color: var(--gold-text);
            background: rgba(195, 150, 77, 0.05);
        }

            gap
