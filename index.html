<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Golden Star Management | إنتاج سمعي بصري وإدارة أعمال</title>
  <meta name="description" content="Golden Star Management - شركة رائدة ومبتكرة في مجالات الإنتاج السمعي البصري، إدارة الأعمال الفنية والمشاهير، جلسات التصوير الاحترافية، المونتاج وتعديل الألوان السينمائي، وتطوير الاستراتيجيات الرقمية والتسويق الفاخر في الجزائر.">
  <meta name="keywords" content="إنتاج سمعي بصري, إدارة أعمال فنية, تصوير سينمائي, مونتاج, موشن جرافيك, جلسات تصوير, الجزائر, Golden Star Management, Bouchama Production, Sam Yonko">
  <meta name="author" content="Golden Star Management">

  <meta name="google-site-verification" content="imfxeDgWzvbo1sTgIrnq8yHISchHAVYRGyeeJYS_GfY" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    /* انتقال سلس ومريح للعين عند التبديل بين الأبيض والأسود */
    body, section, header, footer, .service-card, .team-card, .sponsor-card, input, select, textarea {
      transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease;
    }

    /* المظهر الداكن الافتراضي (الأسود والذهبي الفخم) */
    body {
      font-family: 'Cairo', 'Montserrat', sans-serif;
      background: #030303;
      overflow-x: hidden;
      color: white;
    }

    .hero {
      height: 100vh;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.92)), url('hero.jpg');
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .gold { color: #c9983d; }
    .gold-border { border-color: #c9983d; }

    .nav-link {
      position: relative;
      transition: .4s;
    }
    .nav-link:hover, .nav-link.active { color: #c9983d; }

    .service-card, .team-card, .sponsor-card {
      background: #0b0b0b;
      border: 1px solid rgba(201, 152, 61, .15);
      cursor: pointer;
    }

    .service-card:hover, .team-card:hover, .sponsor-card:hover {
      transform: translateY(-8px);
      border-color: #c9983d;
      box-shadow: 0 0 25px rgba(201, 152, 61, .15);
    }

    .section-title {
      position: relative;
      display: inline-block;
      padding: 0 30px;
    }

    .work-card {
      overflow: hidden;
      position: relative;
    }
    .work-card img { transition: 1s; }
    .work-card:hover img { transform: scale(1.05); }

    .video-placeholder::after {
      content: '▶';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: rgba(0, 0, 0, .65);
      border: 1px solid #c9983d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #c9983d;
      transition: 0.3s;
    }

    .video-placeholder:hover::after {
      background: #c9983d;
      color: black;
      box-shadow: 0 0 15px #c9983d;
    }

    .glow { box-shadow: 0 0 20px rgba(201, 152, 61, .2); }
    .tab-btn { transition: all 0.3s ease; }
    .tab-btn.active { background-color: #c9983d; color: black; border-color: #c9983d; }
    .zoom-clickable { cursor: zoom-in; }

    .order-hint {
      font-size: 10px;
      color: #c9983d;
      opacity: 0.7;
      margin-top: 10px;
      display: block;
      transition: 0.3s;
    }

    /* بنية خانة الإعلانات الجانبية الفاخرة */
    .ads-sidebar {
      position: fixed;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 140px;
      z-index: 40;
      display: none; /* تظهر فقط على الشاشات الكبيرة عبر ذكاء التيلويند */
    }
    
    @media (min-width: 1280px) {
      .ads-sidebar { display: block; }
    }

    /* قواعد الثيم الفاتح */
    body.light-theme {
      background: #fcfcfc;
      color: #1a1a1a;
    }
    
    body.light-theme header {
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    body.light-theme .hero {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.8), rgba(252, 252, 252, 0.98)), url('hero.jpg');
    }

    body.light-theme h1, body.light-theme h2, body.light-theme .nav-link {
      color: #111111;
    }
    body.light-theme .nav-link:hover, body.light-theme .nav-link.active, body.light-theme .gold {
      color: #b58128;
    }

    body.light-theme #sponsors, body.light-theme #portfolio {
      background: #f7f7f7;
    }

    body.light-theme #services, body.light-theme #team, body.light-theme footer {
      background: #ffffff;
    }

    body.light-theme .service-card, body.light-theme .team-card, body.light-theme .sponsor-card {
      background: #fdfdfd;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }
    body.light-theme .service-card:hover, body.light-theme .team-card:hover, body.light-theme .sponsor-card:hover {
      border-color: #b58128;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    body.light-theme .service-card h3, body.light-theme .team-card h3 {
      color: #111111;
    }

    body.light-theme .work-card {
      background: #fcfcfc;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }
    body.light-theme .work-card h3 {
      color: #222222;
    }

    body.light-theme #order-section > div {
      background: #fbfbfb;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    body.light-theme input, body.light-theme select, body.light-theme textarea {
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: #222222;
    }

    body.light-theme .text-white\/50, body.light-theme .text-white\/40, body.light-theme .text-white\/60 {
      color: #555555;
    }
  </style>
</head>

<body>

  <div class="ads-sidebar">
    <div class="bg-neutral-950/90 backdrop-blur-md border border-yellow-700/30 rounded-xl p-3 text-center glow transition-all duration-300">
      <p class="text-[9px] text-yellow-600/60 uppercase tracking-widest mb-2 font-bold" data-key="sidebar-ad-title">مساحة إعلانية</p>
      <div class="w-full h-44 border border-dashed border-yellow-700/20 rounded-lg flex flex-col items-center justify-center bg-black/40 p-2 group hover:border-yellow-500 transition-colors">
        <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">👑</span>
        <span class="text-[10px] text-white/40 leading-normal font-medium" data-key="sidebar-ad-placeholder">مساحة حصرية جاهزة لإعلانك</span>
      </div>
    </div>
  </div>

  <header class="fixed top-0 left-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-yellow-700/10">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      
      <div class="flex items-center gap-3">
        <img src="logo.jpg" class="w-14 h-14 object-cover rounded-md border border-yellow-700/20" alt="Golden Star Logo">
      </div>

      <nav class="hidden lg:flex items-center gap-6 text-sm font-semibold text-white/80">
        <a href="#home" class="nav-link active" data-key="nav-home">الرئيسية</a>
        <a href="#sponsors" class="nav-link" data-key="nav-sponsors">الممولون</a>
        <a href="#services" class="nav-link" data-key="nav-services">خدماتنا</a>
        <a href="#portfolio" class="nav-link" data-key="nav-portfolio">أعمالنا</a>
        <a href="#team" class="nav-link" data-key="nav-team">فريق العمل</a>
        <a href="#order-section" class="nav-link gold font-bold" data-key="nav-order">طلب خدمة</a>
      </nav>

      <div class="flex items-center gap-3">
        <button onclick="toggleTheme()" id="theme-btn" class="bg-neutral-950 border border-yellow-700/30 text-yellow-500 w-9 h-9 flex items-center justify-center rounded-full text-sm focus:outline-none hover
